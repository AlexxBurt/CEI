<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- CSS -->
        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/styles.css">
        <link rel="stylesheet" href="./css/header.css">
        <link rel="stylesheet" href="./css/destinos.css">
        <link rel="stylesheet" href="./css/footer.css">

        <!-- JS -->
        <script src="./js/header.js"defer ></script>
        <script src="./js/destinos.js" defer></script>
        <script src="./js/footer.js"defer ></script>

        <title>TRAVLR: Destinos</title>
    </head>
    <body>

    <!-------------------------->
    <!-- El Header lo traemos -->
    <!-- usando JavaScript ----->
    <!-------------------------->
    <header class="Header"></header>

    <main>
        <h1 class="u-h1">TRAVLR</h1>
        <div class="Wrapper">        
            <div class="Wrapper-slider Slider">
            <!--------------------------------->
            <!-- Slides dinámicas de destinos --
            ---- que traemos con JavaScript --->
            <!--------------------------------->
                <div class="Slider-frame"></div>
                <div class="Slider-frame Slider-frame--2"></div>
                <div class="Slider-frame Slider-frame--3"></div>
                <div class="Slider-frame Slider-frame--4"></div>
                <div class="Slider-frame Slider-frame--5"></div>
                <div class="Slider-frame Slider-frame--6"></div>
                <div class="Slider-frame Slider-frame--7"></div>
                <div class="Slider-frame Slider-frame--8"></div>
            </div>
            <!---------------------------------->
            <!-- Barra lateral de puntos para ---
            ---- navegación entre los destinos --
            ---- y mejora del UX --------------->
            <!---------------------------------->
            <div class="Selector">
                <div class="Selector-dot isActive" title="Egipto"></div>
                <div class="Selector-dot" title="Zimbabwe"></div>
                <div class="Selector-dot" title="Islandia"></div>
                <div class="Selector-dot" title="Austria"></div>
                <div class="Selector-dot" title="Japón"></div>
                <div class="Selector-dot" title="Vietnam"></div>
                <div class="Selector-dot" title="Bahamas"></div>
                <div class="Selector-dot" title="Indonesia"></div>
            </div>
        </div>
    </main>

    <!-------------------------->
    <!-- El Footer lo traemos -->
    <!-- usando JavaScript ----->
    <!-------------------------->
    <footer class="Footer"></footer>

    </body>
</html>

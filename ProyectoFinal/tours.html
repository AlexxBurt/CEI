<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- CSS -->
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/styles.css">
        
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/tours.css">
        <link rel="stylesheet" href="css/footer.css">
        
        <!-- JS -->
        <script src="js/main.js" defer></script>
        <script src="js/tours.js" defer></script>
        
        <title>TRAVLR: Tours</title>
    </head>
    <body>

        <!-- El Header lo traemos usando JavaScript ----->
        <header class="Header"></header>

        <main>
            <h1 class="u-h1">TRAVLR</h1>
            <div class="Wrapper">
                <div class="Wrapper-col Information">
                    <!-- El texto de los encabezados y de los párrafos viene del JSON -->
                    <section class="Information-content">
                        <header class="Information-title">
                            <h2 class="Information-h2"></h2>
                            <h3 class="Information-h3"></h3>
                        </header>
                        <div class="Information-texts">
                            <p class="Information-p Information-p--1"></p>
                            <p class="Information-p Information-p--2"></p>
                            <p class="Information-p Information-p--3"></p>
                        </div>
                    </section>
                    <div class="Information-buttons">
                        <!-- El texto del botón viene por JavaScript -->
                        <button class="Information-button u-primary"></button>
                        <a href="hoteles.html" class="Information-next u-secondary" title="Hoteles">Siguiente</a>
                    </div>
                </div>
                <div class="Wrapper-col Gallery">
                    <!-- Las imágenes de los tours vienen del JSON -->
                    <picture>
                        <img class="Gallery-img" alt="Imagen del tour 2">
                    </picture>
                    <picture>
                        <img class="Gallery-img" alt="Imagen del tour 3">
                    </picture>
                </div>
            </div>
        </main>

        <!-- El Footer lo traemos usando JavaScript ----->
        <footer class="Footer"></footer>

    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet" href="css/contacto.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">

    <!-- JS -->
    <script src="/js/main.js" defer></script>
    <script src="/js/contact.js" defer></script>


    <title>TRAVLR: Contacto</title>
</head>
<body>

    <!-- Traemos el Header con JavaScript -->
    <header class="Header"></header>

    <main>
        <h1 class="u-h1">TRAVLR</h1>
        <div class="Wrapper">
            <div class="Contact">
                <h2 class="Contact-h2">¿Tienes dudas?</h2>
                <span class="Contact-span">Si tienes alguna pregunta o quieres ponerte en contacto con nosotros, utilice el formulario de contacto que encontrará a continuación y le responderemos en un máximo de 24 horas.</span>

                <form class="Contact-form Form" action="#" method="post">
                    <label for="name">Nombre y apellidos <span class="Form-symbol">*</span></label>
                    <input type="text" class="Form-input" id="name" name="name" placeholder="Tu nombre completo" required>
                    <div class="Form-columns">
                        <div class="Form-group">
                            <label for="email">Correo electrónico <span class="Form-symbol">*</span></label>
                            <input type="email" class="Form-input" id="email" name="email" placeholder="ejemplo@email.com" required>
                        </div>
                        <div class="Form-group">
                            <label for="telephone">Teléfono <span class="Form-symbol">*</span></label>
                            <input type="tel" class="Form-input" id="telephone" name="telephone" placeholder="Ej: +34 601 234 567" required>
                        </div>
                    </div>
                    <label for="message">Mensaje <span class="Form-symbol">*</span></label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                    <label for="rgpd">He leído y acepto los<a href="/politica-de-privacidad" class="Form-link" target="_blank"> términos y condiciones </a>de Travlr S.L.<span class="Form-symbol">*</span></label>
                    <input type="checkbox" class="Form-input" id="rgpd" name="rgpd" required>
                    <button type="submit" class="Form-button u-primary">Enviar</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Traemos el Footer con JavaScript -->
    <footer class="Footer"></footer>

    
</body>
</html>

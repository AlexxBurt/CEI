<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- CSS -->
        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/styles.css">
        
        <link rel="stylesheet" href="./css/header.css">
        <link rel="stylesheet" href="./css/index.css">
        <link rel="stylesheet" href="./css/footer.css">

        <!-- JS -->
        <script src="./js/main.js" defer></script>
        <script src="./js/index.js" defer></script>

        <title>TRAVLR: Destinos</title>
    </head>
    <body>

    <!-- El Header lo traemos con JavaScript ----->
    <header class="Header"></header>

    <main>
        <h1 class="u-h1">TRAVLR</h1>
        <div class="Wrapper">        
            <ul class="Wrapper-slider Slider">
                <!-- Slides dinámicas de destinos que traemos con JavaScript --->
                <!-- Las imágenes de fondo y los subtítulos vienen del JSON --->
                <li class="Slider-frame Slider-frame--1">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=egipto" class="Slider-button u-primary" title="Tours de Egipto">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--2">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=zimbabue" class="Slider-button u-primary" title="Tours de Zimbabue">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--3">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=islandia" class="Slider-button u-primary" title="Tours de Islandia">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--4">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=austria" class="Slider-button u-primary" title="Tours de Austria">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--5">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=japon" class="Slider-button u-primary" title="Tours de Japón">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--6">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=vietnam" class="Slider-button u-primary" title="Tours de Vietnam">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--7">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=seychelles" class="Slider-button u-primary" title="Tours de Islas Seychelles">Descubrir destino</a>
                </li>
                <li class="Slider-frame Slider-frame--8">
                    <h2 class="Slider-text"></h2>
                    <a href="tours.html?pais=indonesia" class="Slider-button u-primary" title="Tours de Indonesia">Descubrir destino</a>
                </li>
            </ul>

            <!-- Barra lateral de puntos para navegación entre los destinos -->
            <div class="Selector">
                <div class="Selector-dot isActive" title="Egipto"></div>
                <div class="Selector-dot" title="Zimbabwe"></div>
                <div class="Selector-dot" title="Islandia"></div>
                <div class="Selector-dot" title="Austria"></div>
                <div class="Selector-dot" title="Japón"></div>
                <div class="Selector-dot" title="Vietnam"></div>
                <div class="Selector-dot" title="Seychelles"></div>
                <div class="Selector-dot" title="Indonesia"></div>
            </div>
        </div>
    </main>

    <!-- El Footer lo traemos con JavaScript ----->
    <footer class="Footer"></footer>

    </body>
</html>
